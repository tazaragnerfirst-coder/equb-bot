<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQUB MINI APP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* እዚህ ጋር ቀደም ሲል የሰጠሁህ የCSS ዲዛይን ይገባል... 
           ለአሁኑ አሳጥሬዋለሁ፣ ሙሉውን HTML ተጠቀም */
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .box { padding: 15px; background: white; border-radius: 10px; cursor: pointer; border: 1px solid #ddd; }
        .selected { background: #3b82f6; color: white; }
        #extraBtn { margin-top: 20px; padding: 15px 30px; background: linear-gradient(45deg, #ff4e50, #f9d423); color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>ቁጥር ይምረጡ</h2>
    <div class="grid" id="grid"></div>
    <button id="extraBtn">እጣ ቁረጥ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let selected = [];
        const grid = document.getElementById('grid');
        for(let i=1; i<=100; i++) {
            let div = document.createElement('div');
            div.innerText = i; div.className = 'box';
            div.onclick = () => {
                if(selected.includes(i)) selected = selected.filter(n => n !== i);
                else selected.push(i);
                div.classList.toggle('selected');
            };
            grid.appendChild(div);
        }
        document.getElementById('extraBtn').onclick = () => {
            if(selected.length > 0) {
                tg.sendData(JSON.stringify(selected));
                tg.close();
            } else alert("ቁጥር ይምረጡ!");
        };
    </script>
</body>
</html>
