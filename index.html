<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የእጣ መቁረጫ ሚኒ አፕ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 🎨 የቀለም ተለዋዋጮች (Light & Dark Mode) */
        :root {
            --bg-gradient: linear-gradient(135deg, #e0e8f5 0%, #eef2f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glass-blur: blur(25px);
            --available-color: rgba(255, 255, 255, 0.65);
            --sold-color: rgba(254, 226, 226, 0.7);
            --selected-blue: #3b82f6;
            --text-dark: #2d3748;
            --text-sold: #f43f5e;
            --blob-1: rgba(147, 197, 253, 0.4);
            --blob-2: rgba(247, 178, 191, 0.35);
        }

        /* 🌙 ቴሌግራም ናይት ሞድ ሲሆን */
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --available-color: rgba(51, 65, 85, 0.6);
            --sold-color: rgba(127, 29, 29, 0.4);
            --text-dark: #f8fafc;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; color: var(--text-dark);
            transition: all 0.3s ease;
        }

        /* ✨ የሚንሳፈፉ ኳሶች (Blobs) */
        body::before, body::after {
            content: ""; position: absolute; border-radius: 50%;
            filter: blur(80px); z-index: -1;
        }
        body::before { width: 250px; height: 250px; background: var(--blob-1); top: 5%; left: -10%; }
        body::after { width: 250px; height: 250px; background: var(--blob-2); bottom: 10%; right: -10%; }

        /* 🔍 ሰርች ባር */
        .search-fixed-wrapper {
            position: fixed; top: 0; width: 100%; max-width: 390px;
            padding: 16px; z-index: 110; pointer-events: none;
        }
        .top-bar { display: flex; width: 100%; gap: 8px; pointer-events: auto; }
        .search-container { flex: 1; position: relative; }
        .search-bar {
            width: 100%; padding: 12px 16px 12px 42px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border-radius: 20px; font-size: 15px; color: var(--text-dark);
            outline: none; transition: all 0.3s ease;
        }
        .search-bar.fade-out::placeholder { opacity: 0; transform: translateY(-5px); }

        .quick-pick-btn, .theme-toggle-btn {
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            backdrop-filter: var(--glass-blur); border-radius: 20px;
            color: var(--text-dark); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .quick-pick-btn { padding: 0 14px; font-size: 13px; font-weight: 600; }
        .theme-toggle-btn { width: 44px; height: 44px; font-size: 18px; }

        /* 🛒 የተመረጡ ቁጥሮች (Cart Panel) */
        .cart-fixed-wrapper {
            position: fixed; top: 64px; width: 100%; max-width: 390px;
            padding: 4px 16px 10px 16px; z-index: 100; pointer-events: none;
        }
        .cart-panel {
            display: none; width: 100%; background: var(--glass-bg);
            border: 1px solid var(--glass-border); backdrop-filter: var(--glass-blur);
            border-radius: 20px; padding: 10px 14px; align-items: center;
            justify-content: space-between; gap: 10px; pointer-events: auto;
        }
        .chips-wrapper {
            flex: 1; overflow: hidden; position: relative; white-space: nowrap;
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        .selected-chips { display: inline-flex; gap: 6px; padding: 2px 15px; transition: transform 0.3s ease; }
        
        .chip {
            width: 32px; height: 32px;
            background: linear-gradient(45deg, #ff4e50, #f9d423, #00c6ff, #0072ff, #ff4e50);
            background-size: 400% 400%; color: white; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; animation: rainbowGlow 8s ease infinite;
        }

        /* 🌈 Rainbow Glow Button */
        .extra-btn {
            background: linear-gradient(45deg, #ff4e50, #f9d423, #00c6ff, #0072ff, #ff4e50);
            background-size: 400% 400%; color: white; border: none;
            padding: 8px 16px; border-radius: 16px; font-size: 13px;
            font-weight: bold; cursor: pointer; animation: rainbowGlow 8s ease infinite;
        }

        @keyframes rainbowGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🔢 የቁጥሮች ግሪድ */
        .scrollable-content { width: 100%; max-width: 390px; padding: 72px 16px 24px 16px; }
        .scrollable-content.shifted { padding-top: 134px; }
        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; }
        .number-box {
            aspect-ratio: 1; border-radius: 14px; display: flex;
            align-items: center; justify-content: center; font-size: 16px;
            font-weight: 700; cursor: pointer; transition: all 0.15s ease;
        }
        .available { background: var(--available-color); color: var(--text-dark); border: 1px solid var(--glass-border); }
        .sold { background: var(--sold-color); color: var(--text-sold); cursor: not-allowed; opacity: 0.6; }
        .number-box.selected { background: var(--selected-blue) !important; color: white !important; transform: scale(1.05); }

        /* ⚠️ Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 24px; border-radius: 24px; text-align: center; max-width: 300px;
        }
        .modal-btn {
            background: linear-gradient(45deg, #ff4e50, #f9d423, #00c6ff, #0072ff, #ff4e50);
            background-size: 400% 400%; color: white; border: none; padding: 12px;
            border-radius: 12px; width: 100%; font-weight: bold; animation: rainbowGlow 8s ease infinite;
        }
    </style>
</head>
<body>

    <div class="search-fixed-wrapper">
        <div class="top-bar">
            <div class="search-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="ቁጥር ይፈልጉ...">
            </div>
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="cart-fixed-wrapper">
        <div class="cart-panel" id="cartPanel">
            <div class="chips-wrapper">
                <div class="selected-chips" id="chipsContainer"></div>
            </div>
            <div class="price-tag" id="priceTag">0 ETB</div>
            <button class="extra-btn" id="extraBtn">እጣ ቁረጥ</button>
        </div>
    </div>

    <div class="scrollable-content" id="scrollContent">
        <div class="number-grid" id="numberGrid"></div>
    </div>

    <div class="modal-overlay" id="errorModal">
        <div class="modal-box">
            <h3 style="color: var(--text-sold);">⚠️ ገደብ አልፏል!</h3>
            <p>በአንድ ጊዜ እስከ 15 ቁጥሮችን ብቻ መምረጥ ይችላሉ።</p>
            <button class="modal-btn" onclick="closeModal()">እሺ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let ticketPrice = 20; 
        let totalTickets = 100; 
        let mySelections = [];
        let soldTickets = [12, 45, 67]; // ለሙከራ፣ ቦቱ ላይ ሲገናኝ ከዳታቤዝ ይመጣል

        // 🌗 ናይት ሞድ ማስተካከያ
        if (tg.colorScheme === 'dark') { document.body.classList.add('dark-mode'); }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeToggleBtn');
            btn.innerText = document.body.classList.contains('dark-mode') ? "☀️" : "🌙";
        }

        function renderGrid(filter = '') {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= totalTickets; i++) {
                if (filter && !i.toString().includes(filter)) continue;
                
                const box = document.createElement('div');
                box.innerText = i;
                const isSold = soldTickets.includes(i);
                box.className = `number-box ${isSold ? 'sold' : 'available'}`;
                if (mySelections.includes(i)) box.classList.add('selected');
                
                box.onclick = () => { if (!isSold) handleSelect(i); };
                grid.appendChild(box);
            }
        }

        function handleSelect(num) {
            if (mySelections.includes(num)) {
                mySelections = mySelections.filter(n => n !== num);
            } else {
                if (mySelections.length >= 15) {
                    document.getElementById('errorModal').style.display = 'flex';
                    return;
                }
                mySelections.push(num);
            }
            updateUI();
        }

        function updateUI() {
            const panel = document.getElementById('cartPanel');
            const content = document.getElementById('scrollContent');
            const container = document.getElementById('chipsContainer');
            
            if (mySelections.length > 0) {
                panel.style.display = 'flex';
                content.classList.add('shifted');
                container.innerHTML = '';
                mySelections.sort((a,b) => a-b).forEach(n => {
                    const chip = document.createElement('div');
                    chip.className = 'chip'; chip.innerText = n;
                    container.appendChild(chip);
                });
                document.getElementById('priceTag').innerText = `${mySelections.length * ticketPrice} ETB`;
            } else {
                panel.style.display = 'none';
                content.classList.remove('shifted');
            }
            renderGrid(document.getElementById('searchBar').value);
        }

        // 📤 መረጃ ለቦቱ መላክ
        document.getElementById('extraBtn').onclick = () => {
            if (mySelections.length > 0) {
                tg.sendData(JSON.stringify(mySelections));
                tg.close();
            }
        };

        document.getElementById('searchBar').oninput = (e) => renderGrid(e.target.value);
        function closeModal() { document.getElementById('errorModal').style.display = 'none'; }

        renderGrid();
    </script>
</body>
</html>
