<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የእጣ መቁረጫ ሚኒ አፕ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0e8f5 0%, #eef2f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-blur: blur(20px);
            --available-color: #f0f4f8;
            --sold-color: rgba(254, 226, 226, 0.8);
            --selected-blue: #3b82f6;
            --text-dark: #2d3748;
            --text-sold: #f43f5e;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --available-color: rgba(51, 65, 85, 0.5);
            --text-dark: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient); min-height: 100vh; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden; color: var(--text-dark);
        }

        /* ሰርች ባር ማሸጊያ - ስፋቱ ተስተካክሏል */
        .search-fixed-wrapper {
            position: fixed; top: 0; width: 100%; padding: 12px 16px; z-index: 110;
            background: transparent;
        }

        .top-bar { display: flex; align-items: center; gap: 8px; width: 100%; }
        
        .search-container { flex: 1; position: relative; }
        .search-bar {
            width: 100%; padding: 12px 16px 12px 40px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 18px; font-size: 15px; color: var(--text-dark); outline: none;
        }
        .search-container::before { content: "🔍"; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; }

        .theme-toggle-btn {
            width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--glass-border);
            background: var(--glass-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        /* ካርት ፓነል - በፎቶው መሰረት የተስተካከለ */
        .cart-fixed-wrapper {
            position: fixed; top: 68px; width: 100%; padding: 0 16px; z-index: 100; pointer-events: none;
        }

        .cart-panel {
            display: none; width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 20px; padding: 8px 12px; align-items: center; justify-content: space-between;
            pointer-events: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .chips-wrapper { flex: 1; overflow: hidden; white-space: nowrap; mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%); }
        .selected-chips { display: inline-flex; gap: 5px; padding: 5px; }

        .chip {
            width: 30px; height: 30px; background: var(--selected-blue); color: #fff;
            border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; flex-shrink: 0; box-shadow: 0 2px 5px rgba(59, 130, 246, 0.3);
        }

        .price-tag { font-size: 13px; font-weight: 800; color: var(--text-dark); margin: 0 10px; white-space: nowrap; }

        .extra-btn {
            background: #ffc107; color: #fff; border: none; padding: 10px 16px;
            border-radius: 14px; font-size: 13px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 193, 7, 0.3); transition: transform 0.1s;
        }
        .extra-btn:active { transform: scale(0.95); }

        /* የቁጥሮች ግሪድ */
        .scrollable-content { width: 100%; padding: 78px 16px 24px 16px; transition: padding-top 0.3s ease; }
        .scrollable-content.shifted { padding-top: 138px; }

        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; }

        .number-box {
            aspect-ratio: 1; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; user-select: none;
            background: var(--available-color); border: 1px solid var(--glass-border); color: var(--text-dark);
        }
        .sold { background: var(--sold-color); color: var(--text-sold); cursor: not-allowed; opacity: 0.6; }
        .number-box.selected { background: var(--selected-blue) !important; color: white !important; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        /* አድሚን */
        .admin-panel { display: none; background: rgba(30, 41, 59, 0.98); padding: 20px; border-radius: 20px; color: white; width: 100%; margin-top: 20px; }
        .admin-panel input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: #fff; padding: 20px; border-radius: 20px; width: 85%; text-align: center; }
    </style>
</head>
<body>

    <div class="search-fixed-wrapper">
        <div class="top-bar">
            <div class="search-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="ቁጥር ይፈልጉ...">
            </div>
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="cart-fixed-wrapper">
        <div class="cart-panel" id="cartPanel">
            <div class="chips-wrapper" id="chipsWrapper">
                <div class="selected-chips" id="chipsContainer"></div>
            </div>
            <div class="price-tag" id="priceTag">0 ETB</div>
            <button class="extra-btn" id="extraBtn">እጣ ቁረጥ</button>
        </div>
    </div>

    <div class="scrollable-content" id="scrollContent">
        <div class="number-grid" id="numberGrid"></div>
        
        <div class="admin-panel" id="adminPanel">
            <h3>🔐 Admin Settings</h3>
            <input type="number" id="adminTotalNumbers" value="100" placeholder="Total Tickets">
            <input type="number" id="adminPrice" value="20" placeholder="Price per Ticket">
            <button style="width:100%; padding:12px; background:#3b82f6; color:white; border:none; border-radius:10px; font-weight:bold;" onclick="saveAdminChanges()">SAVE</button>
        </div>
    </div>

    <div class="modal-overlay" id="errorModal">
        <div class="modal-box">
            <h3 style="color:#f43f5e">⚠️ ገደብ አልፏል!</h3>
            <p>ከ15 በላይ እጣ መምረጥ አይቻልም።</p>
            <button style="width:100%; padding:12px; background:#3b82f6; color:white; border:none; border-radius:10px;" onclick="closeModal()">እሺ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let ticketPrice = 20; 
        let totalTickets = 100; 
        let ticketsData = {}; 
        let mySelections = [];

        // ዳታቤዝ ማስጀመሪያ (ሁሉም ነፃ እንዲሆኑ)
        for(let i = 1; i <= 1000; i++) { ticketsData[i] = 1; }

        const numberGrid = document.getElementById('numberGrid');
        const searchBar = document.getElementById('searchBar');
        const cartPanel = document.getElementById('cartPanel');
        const chipsContainer = document.getElementById('chipsContainer');
        const priceTag = document.getElementById('priceTag');
        const scrollContent = document.getElementById('scrollContent');
        const adminPanel = document.getElementById('adminPanel');

        function renderTickets(filter = '') {
            numberGrid.innerHTML = '';
            for (let i = 1; i <= totalTickets; i++) {
                if (filter && !i.toString().includes(filter)) continue;

                const box = document.createElement('div');
                box.innerText = i;
                box.className = 'number-box ' + (ticketsData[i] === 3 ? 'sold' : 'available');
                if (mySelections.includes(i)) box.classList.add('selected');

                box.onclick = () => {
                    if(ticketsData[i] === 3) return;
                    toggleSelection(i);
                };
                numberGrid.appendChild(box);
            }
        }

        function toggleSelection(num) {
            const idx = mySelections.indexOf(num);
            if (idx > -1) {
                mySelections.splice(idx, 1);
            } else {
                if (mySelections.length >= 15) {
                    document.getElementById('errorModal').style.display='flex';
                    return;
                }
                mySelections.push(num);
            }
            updateCart();
            renderTickets(searchBar.value === 'admin123' ? '' : searchBar.value);
        }

        function updateCart() {
            if (mySelections.length === 0) {
                cartPanel.style.display = 'none';
                scrollContent.classList.remove('shifted');
                return;
            }
            cartPanel.style.display = 'flex';
            scrollContent.classList.add('shifted');
            chipsContainer.innerHTML = mySelections.sort((a,b)=>a-b).map(n => `<div class="chip">${n}</div>`).join('');
            priceTag.innerText = `${mySelections.length * ticketPrice} ETB`;
        }

        // መረጃ ለቦቱ መላኪያ - በትክክል እንዲሰራ
        document.getElementById('extraBtn').onclick = () => {
            if(mySelections.length > 0) {
                const result = {
                    action: "buy_tickets",
                    numbers: mySelections
                };
                tg.sendData(JSON.stringify(result));
            }
        };

        searchBar.oninput = (e) => {
            const val = e.target.value.trim();
            if(val === 'admin123') {
                adminPanel.style.display = 'block';
                numberGrid.style.display = 'none';
            } else {
                adminPanel.style.display = 'none';
                numberGrid.style.display = 'grid';
                renderTickets(val);
            }
        };

        function saveAdminChanges() {
            totalTickets = document.getElementById('adminTotalNumbers').value;
            ticketPrice = document.getElementById('adminPrice').value;
            adminPanel.style.display = 'none';
            numberGrid.style.display = 'grid';
            searchBar.value = '';
            renderTickets();
        }

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggleBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        function closeModal() { document.getElementById('errorModal').style.display='none'; }

        renderTickets();
    </script>
</body>
</html>
