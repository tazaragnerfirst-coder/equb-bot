<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የእጣ መቁረጫ ሚኒ አፕ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0e8f5 0%, #eef2f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.4);
            --available: #ffffff; --sold: #ffebee; --selected: #3b82f6;
            --text: #2d3748;
        }
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.8); --text: #f8fafc; --available: rgba(255,255,255,0.05);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-gradient); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Search Bar Effect */
        .search-fixed-wrapper { position: fixed; top: 0; width: 100%; padding: 15px; z-index: 100; box-sizing: border-box; }
        .search-bar { 
            width: 100%; padding: 12px 40px; border-radius: 20px; border: 1px solid var(--glass-border); 
            background: var(--glass-bg); backdrop-filter: blur(10px); color: var(--text); outline: none;
            transition: all 0.3s ease;
        }
        .search-bar::placeholder { transition: opacity 0.4s ease; }
        .search-bar.fade-out::placeholder { opacity: 0; }

        /* Grid */
        .scroll-content { padding: 80px 15px 100px 15px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .box { 
            aspect-ratio: 1; border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; border: 1px solid var(--glass-border);
        }
        .available { background: var(--available); }
        .sold { background: var(--sold); color: #f43f5e; cursor: not-allowed; }
        .selected { background: var(--selected) !important; color: white !important; transform: scale(0.9); }

        /* Admin Panel Internal */
        .admin-view { display: none; background: var(--glass-bg); padding: 20px; border-radius: 20px; margin-top: 20px; }
        .sold-item { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); font-size: 14px; }
    </style>
</head>
<body>

    <div class="search-fixed-wrapper">
        <input type="text" id="searchBar" class="search-bar" placeholder="ቁጥር ይፈልጉ...">
    </div>

    <div class="scroll-content">
        <div id="numberGrid" class="grid"></div>

        <!-- አድሚን ፓነል -->
        <div id="miniAdmin" class="admin-view">
            <h2 style="color: #3b82f6;">🔐 አድሚን ዳሽቦርድ</h2>
            <div id="soldHistory">
                <!-- የተሸጡ ዝርዝር እዚህ ይገባል -->
            </div>
            <button onclick="location.reload()" style="width: 100%; padding: 10px; margin-top: 10px; border-radius: 10px; border: none; background: #3b82f6; color: white;">ውጣ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let mySelections = [];
        let soldTickets = { 
            9: { name: "አበበ", phone: "0911...", time: "2:30 PM" },
            18: { name: "ሳራ", phone: "0922...", time: "4:15 PM" }
        };

        const searchBar = document.getElementById('searchBar');
        const grid = document.getElementById('numberGrid');
        const adminView = document.getElementById('miniAdmin');
        const historyDiv = document.getElementById('soldHistory');

        // Placeholder Animation
        const hints = ["ቁጥር 5 ይፈልጋሉ?", "admin123 ብለው ይፃፉ", "እድለኛ ቁጥሮን ይምረጡ", "15 ትኬት መግዛት ይችላሉ"];
        let hintIdx = 0;
        setInterval(() => {
            searchBar.classList.add('fade-out');
            setTimeout(() => {
                hintIdx = (hintIdx + 1) % hints.length;
                searchBar.placeholder = hints[hintIdx];
                searchBar.classList.remove('fade-out');
            }, 400);
        }, 3000);

        function render() {
            grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const box = document.createElement('div');
                box.innerText = i;
                box.className = 'box ' + (soldTickets[i] ? 'sold' : 'available');
                if(mySelections.includes(i)) box.classList.add('selected');
                
                box.onclick = () => {
                    if(soldTickets[i]) return;
                    if(mySelections.includes(i)) mySelections = mySelections.filter(n => n!==i);
                    else if(mySelections.length < 15) mySelections.push(i);
                    render();
                };
                grid.appendChild(box);
            }
        }

        searchBar.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            if(val === 'admin123') {
                grid.style.display = 'none';
                adminView.style.display = 'block';
                loadHistory();
            } else {
                grid.style.display = 'grid';
                adminView.style.display = 'none';
                // ሰርች ሎጅክ እዚህ ይገባል
            }
        };

        function loadHistory() {
            historyDiv.innerHTML = '<h3>የተሸጡ ቁጥሮች ዝርዝር:</h3>';
            for(let num in soldTickets) {
                historyDiv.innerHTML += `
                    <div class="sold-item">
                        <b>ቁጥር ${num}</b> - ተጠቃሚ: ${soldTickets[num].name}<br>
                        📞 ስልክ: ${soldTickets[num].phone} | ⏰ ሰዓት: ${soldTickets[num].time}
                    </div>`;
            }
        }

        render();
    </script>
</body>
</html>
