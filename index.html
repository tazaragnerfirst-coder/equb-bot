<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የእጣ መቁረጫ ሚኒ አፕ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 🎨 የቀለም ተለዋዋጮች (Light & Dark Mode) */
        :root {
            --bg-gradient: linear-gradient(135deg, #e0e8f5 0%, #eef2f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glass-blur: blur(25px);
            --available-color: rgba(255, 255, 255, 0.65);
            --sold-color: rgba(254, 226, 226, 0.7);
            --selected-blue: #3b82f6;
            --text-dark: #2d3748;
            --text-sold: #f43f5e;
            --blob-1: rgba(147, 197, 253, 0.4);
            --blob-2: rgba(247, 178, 191, 0.35);
        }
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --available-color: rgba(51, 65, 85, 0.6);
            --sold-color: rgba(127, 29, 29, 0.4);
            --selected-blue: #2563eb;
            --text-dark: #f8fafc;
            --text-sold: #ef4444;
            --blob-1: rgba(37, 99, 235, 0.15);
            --blob-2: rgba(225, 29, 72, 0.1);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient); min-height: 100vh; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden; color: var(--text-dark);
        }
        body::before, body::after { content: ""; position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; }
        body::before { width: 250px; height: 250px; background: var(--blob-1); top: 5%; left: -10%; }
        body::after { width: 250px; height: 250px; background: var(--blob-2); bottom: 10%; right: -10%; }
        .search-fixed-wrapper { position: fixed; top: 0; width: 100%; max-width: 390px; padding: 16px 16px 6px 16px; z-index: 110; pointer-events: none; }
        .top-bar { display: flex; width: 100%; gap: 8px; pointer-events: auto; }
        .search-container { flex: 1; position: relative; }
        .search-bar { width: 100%; padding: 12px 16px 12px 42px; border: 1px solid var(--glass-border); background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: 20px; font-size: 15px; color: var(--text-dark); outline: none; }
        .search-container::before { content: "🔍"; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; }
        .quick-pick-btn, .theme-toggle-btn { border: 1px solid var(--glass-border); background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: 20px; color: var(--text-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .quick-pick-btn { padding: 0 14px; font-size: 13px; font-weight: 600; opacity: 0.6; }
        .cart-fixed-wrapper { position: fixed; top: 64px; width: 100%; max-width: 390px; padding: 4px 16px 10px 16px; z-index: 100; pointer-events: none; }
        .cart-panel { display: none; width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: var(--glass-blur); border-radius: 20px; padding: 10px 14px; align-items: center; justify-content: space-between; gap: 10px; pointer-events: auto; }
        .chips-wrapper { flex: 1; overflow: hidden; position: relative; white-space: nowrap; mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%); }
        .selected-chips { display: inline-flex; gap: 6px; padding: 2px 15px; }
        .chip { width: 32px; height: 32px; background: linear-gradient(45deg, #ff4e50, #f9d423, #00c6ff, #0072ff, #ff4e50); background-size: 400% 400%; color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; animation: rainbowGlow 8s ease infinite; }
        @keyframes rainbowGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .extra-btn { background: linear-gradient(45deg, #ff4e50, #f9d423, #00c6ff, #0072ff, #ff4e50); background-size: 400% 400%; color: white; border: none; padding: 8px 16px; border-radius: 16px; font-size: 13px; font-weight: bold; cursor: pointer; animation: rainbowGlow 8s ease infinite; }
        .scrollable-content { width: 100%; max-width: 390px; padding: 72px 16px 24px 16px; transition: padding-top 0.2s ease; }
        .scrollable-content.shifted { padding-top: 134px; }
        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; }
        .number-box { aspect-ratio: 1; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s ease; }
        .available { background: var(--available-color); border: 1px solid var(--glass-border); }
        .sold { background: var(--sold-color); color: var(--text-sold); cursor: not-allowed; }
        .number-box.selected { background: var(--selected-blue) !important; color: white !important; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: var(--glass-bg); padding: 24px; border-radius: 24px; width: 90%; max-width: 320px; text-align: center; }
        .modal-btn { background: var(--selected-blue); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        .admin-panel { display: none; background: rgba(30, 41, 59, 0.95); padding: 20px; border-radius: 24px; color: white; margin-top: 20px; }
        .admin-panel input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; }
    </style>
</head>
<body>

    <div class="search-fixed-wrapper">
        <div class="top-bar">
            <div class="search-container">
                <input type="number" id="searchBar" class="search-bar" placeholder="ቁጥር ይፈልጉ...">
            </div>
            <button class="quick-pick-btn" id="quickPickBtn">Quick Pick</button>
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="cart-fixed-wrapper">
        <div class="cart-panel" id="cartPanel">
            <div class="chips-wrapper">
                <div class="selected-chips" id="chipsContainer"></div>
            </div>
            <div class="price-tag" id="priceTag" style="font-size: 12px; font-weight: bold;">0 ETB</div>
            <button class="extra-btn" id="extraBtn">እጣ ቁረጥ</button>
        </div>
    </div>

    <div class="scrollable-content" id="scrollContent">
        <div class="number-grid" id="numberGrid"></div>
        <div class="admin-panel" id="adminPanel">
            <h3>🔐 አድሚን</h3>
            <input type="number" id="adminTotalNumbers" value="100">
            <input type="number" id="adminPrice" value="20">
            <button class="modal-btn" onclick="saveAdminChanges()">ለውጦችን አስቀምጥ</button>
        </div>
    </div>

    <div class="modal-overlay" id="errorModal">
        <div class="modal-box">
            <h3 style="color:var(--text-sold)">⚠️ ገደብ አልፏል!</h3>
            <p>ከ15 በላይ እጣ መምረጥ አይቻልም።</p>
            <button class="modal-btn" onclick="closeModal()">እሺ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if(tg) tg.expand();

        let ticketPrice = 20; 
        let totalTickets = 100; 
        let ticketsData = {}; 
        let mySelections = [];

        // ዳታ ማመንጫ (ለሙከራ)
        for(let i = 1; i <= 1000; i++) { ticketsData[i] = (i % 9 === 0) ? 3 : 1; }

        const numberGrid = document.getElementById('numberGrid');
        const searchBar = document.getElementById('searchBar');
        const cartPanel = document.getElementById('cartPanel');
        const chipsContainer = document.getElementById('chipsContainer');
        const priceTag = document.getElementById('priceTag');
        const adminPanel = document.getElementById('adminPanel');
        const scrollContent = document.getElementById('scrollContent');

        function renderTickets(filter = '') {
            numberGrid.innerHTML = '';
            for (let i = 1; i <= totalTickets; i++) {
                if (filter && !i.toString().includes(filter)) continue;
                const box = document.createElement('div');
                box.innerText = i;
                box.className = 'number-box ' + (ticketsData[i] === 3 ? 'sold' : 'available');
                if (mySelections.includes(i)) box.classList.add('selected');
                box.onclick = () => { if(ticketsData[i] !== 3) toggleSelection(i); };
                numberGrid.appendChild(box);
            }
        }

        function toggleSelection(num) {
            const idx = mySelections.indexOf(num);
            if (idx > -1) { mySelections.splice(idx, 1); } 
            else {
                if (mySelections.length >= 15) { document.getElementById('errorModal').style.display='flex'; return; }
                mySelections.push(num);
            }
            updateCart();
            renderTickets(searchBar.value);
        }

        function updateCart() {
            if (mySelections.length === 0) {
                cartPanel.style.display = 'none';
                scrollContent.classList.remove('shifted');
                return;
            }
            cartPanel.style.display = 'flex';
            scrollContent.classList.add('shifted');
            chipsContainer.innerHTML = mySelections.sort((a,b)=>a-b).map(n => `<div class="chip">${n}</div>`).join('');
            priceTag.innerText = `${mySelections.length * ticketPrice} ETB`;
        }

        document.getElementById('extraBtn').onclick = () => {
            if(mySelections.length > 0) {
                tg.sendData(JSON.stringify({
                    action: "buy_tickets", // ቦቱ ጋር እንዲመሳሰል ተስተካክሏል
                    numbers: mySelections
                }));
            }
        };

        // Quick Pick ባዶ እንዲሆን ተደርጓል
        document.getElementById('quickPickBtn').onclick = () => { };

        searchBar.oninput = (e) => {
            const val = e.target.value;
            if(val === 'admin123') { 
                adminPanel.style.display = 'block';
                numberGrid.style.display = 'none';
            } else {
                adminPanel.style.display = 'none';
                numberGrid.style.display = 'grid';
                renderTickets(val);
            }
        };

        function saveAdminChanges() {
            totalTickets = document.getElementById('adminTotalNumbers').value;
            ticketPrice = document.getElementById('adminPrice').value;
            adminPanel.style.display = 'none';
            numberGrid.style.display = 'grid';
            searchBar.value = '';
            renderTickets();
        }

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggleBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        function closeModal() { document.getElementById('errorModal').style.display='none'; }

        renderTickets();
    </script>
</body>
</html>
