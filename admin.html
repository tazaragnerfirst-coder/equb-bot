<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Admin - OPEN TICKET</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0e1014; --tgblue:#2ea6ff; --card:#17191f; --card2:#1c1f26;
    --border:#252830; --text:#eceef0; --dim:#8d9097; --danger:#ef5350;
    --green:#34c471;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;}
  html, body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  body{
    padding-top: calc(var(--safe-top) + 8px);
    padding-bottom: calc(var(--safe-bottom) + 24px);
  }

  /* ── Search bar ── */
  #searchWrap{
    padding:8px 14px 10px;
    position:sticky; top:0; z-index:10;
    background:var(--bg);
  }
  #searchBar{
    width:100%; padding:10px 14px; border-radius:20px; border:1px solid var(--border);
    background:var(--card); color:var(--text); font-size:15px; outline:none;
  }
  #searchBar::placeholder{ color:var(--dim); }
  #searchBar:focus{ border-color: var(--tgblue); }

  #statusLine{ padding:6px 18px 6px; color:var(--dim); font-size:12.5px; }

  /* ── Floating cards ── */
  #cardList{
    padding:4px 12px; display:flex; flex-direction:column; gap:10px;
  }

  .row-card{
    display:flex; align-items:center; gap:12px;
    padding:10px;
    border-radius:16px;
    background:var(--card);
    box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.03);
    cursor:pointer;
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  .row-card:active{
    transform: scale(.97);
    background:var(--card2);
    box-shadow: 0 0 0 1.5px rgba(46,166,255,.55), 0 4px 14px rgba(46,166,255,.18);
  }

  .thumb{
    width:54px; height:54px; flex:0 0 auto;
    border-radius:12px; overflow:hidden;
    background:var(--card2);
    position:relative;
  }
  .thumb img{
    width:100%; height:100%; object-fit:cover; display:block;
    position:absolute; inset:0;
    transition:opacity .2s;
  }
  .thumb.loading{
    background: linear-gradient(90deg,var(--card2) 25%,#232631 50%,var(--card2) 75%);
    background-size:200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .thumb.loading img{ opacity:0; }
  @keyframes shimmer{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
  }

  .row-info{ flex:1; min-width:0; }
  .row-info .r-name{
    font-size:15px; font-weight:600; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .row-info .r-phone{
    font-size:13px; color:var(--dim); margin-top:1px;
  }

  .row-right{
    flex:0 0 auto; text-align:right;
  }
  .row-date{
    font-size:11.5px; color:var(--dim); white-space:nowrap;
  }
  .row-count{
    font-size:11px; color:var(--tgblue); white-space:nowrap; margin-top:3px;
    font-weight:600;
  }

  #centerMsg{
    text-align:center; color:var(--dim); padding:60px 20px; font-size:14px;
  }
  #centerMsg.error{ color:var(--danger); }

  /* ── Detail modal ── */
  #modal{
    display:none; position:fixed; inset:0; z-index:200;
    background:var(--bg);
    flex-direction:column;
  }
  #modal.open{ display:flex; }

  #modalHeader{
    display:flex; align-items:center; gap:12px;
    padding:calc(var(--safe-top) + 12px) 16px 12px;
    background:var(--card);
  }
  #modalClose{
    background:var(--card2); border:none; color:var(--text);
    width:32px; height:32px; border-radius:16px; font-size:15px;
    cursor:pointer; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
  }
  #modalClose:active{ background:var(--border); }
  #modalTitle{ font-size:16px; font-weight:700; }

  #modalBody{
    flex:1; overflow-y:auto; padding:16px;
    padding-bottom: calc(var(--safe-bottom) + 24px);
  }

  .modal-receipt{
    width:100%; max-height:260px; overflow:hidden;
    border-radius:16px;
    background:#000; cursor:pointer; margin-bottom:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-receipt img{
    width:100%; height:100%; object-fit:contain; display:block;
  }

  .info-card{
    background:var(--card); border-radius:16px; overflow:hidden; margin-bottom:12px;
  }
  .detail-row{
    display:flex; justify-content:space-between; align-items:flex-start;
    font-size:14px; padding:11px 14px; color:var(--dim);
    border-bottom:1px solid var(--border);
    gap:12px;
  }
  .detail-row:last-child{ border-bottom:none; }
  .detail-row .d-label{ flex:0 0 auto; }
  .detail-row .d-val{
    color:var(--text); font-weight:500; text-align:right;
  }

  .nums-wrap{ padding:12px 14px; }
  .nums-wrap .d-label{ font-size:13px; color:var(--dim); margin-bottom:9px; display:block; }
  .nums-scroll{
    display:flex; gap:6px; overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:2px;
  }
  .num-chip{
    flex:0 0 auto;
    background:var(--card2);
    color:var(--tgblue);
    border-radius:8px;
    padding:6px 11px;
    font-size:13.5px;
    font-weight:700;
    white-space:nowrap;
  }

  /* ── Fullscreen receipt overlay ── */
  #overlay{
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,.96);
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:16px;
    padding-top: calc(var(--safe-top) + 16px);
    padding-bottom: calc(var(--safe-bottom) + 16px);
  }
  #overlay.open{ display:flex; }
  #overlayImg{
    max-width:100%; max-height:78vh; border-radius:10px; object-fit:contain;
  }
  #overlayLoader{ color:var(--dim); font-size:14px; margin-bottom:12px; display:none; }
  #overlay.loading #overlayLoader{ display:block; }
  #overlay.loading #overlayImg{ opacity:.3; }
  #overlayClose{
    margin-top:22px; padding:11px 36px; border-radius:24px;
    background:var(--card); border:none;
    color:var(--text); font-size:14px; cursor:pointer; font-weight:600;
  }
  #overlayClose:active{ background:var(--card2); }
</style>
</head>
<body>

<div id="searchWrap">
  <input id="searchBar" type="text" inputmode="search" autocomplete="off" placeholder="ስም, ስልክ ወይም ቁጥር ፈልግ">
</div>
<div id="statusLine"></div>
<div id="cardList"></div>
<div id="centerMsg">በመጫን ላይ...</div>

<!-- Detail modal -->
<div id="modal">
  <div id="modalHeader">
    <button id="modalClose">✕</button>
    <span id="modalTitle">ዝርዝር</span>
  </div>
  <div id="modalBody"></div>
</div>

<!-- Fullscreen receipt overlay -->
<div id="overlay">
  <div id="overlayLoader">ደረሰኝ እየጫነ ነው...</div>
  <img id="overlayImg" src="" alt="Receipt">
  <button id="overlayClose">ዝጋ</button>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc }
                           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getAuth, signInWithCustomToken }
                           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyALC5m34A85Xpscnu4N6gW88tYQ1YyaOB0",
  authDomain: "equb-c5f5f.firebaseapp.com",
  projectId: "equb-c5f5f",
  storageBucket: "equb-c5f5f.firebasestorage.app",
  messagingSenderId: "745997733561",
  appId: "1:745997733561:web:6a37c360fdc5fa2d559568"
};

const app   = initializeApp(firebaseConfig);
const dbf   = getFirestore(app);
const authf = getAuth(app);

const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();

  // ── Adapt colors to Telegram's current theme (auto light/dark, follows device) ──
  applyTelegramTheme(tg.themeParams);
  tg.onEvent('themeChanged', () => applyTelegramTheme(tg.themeParams));

  // Tell Telegram our own background so header/bottom chrome matches
  try {
    tg.setHeaderColor(tg.themeParams.bg_color || '#0e1014');
    tg.setBackgroundColor(tg.themeParams.bg_color || '#0e1014');
  } catch {}
}

function applyTelegramTheme(p) {
  if (!p) return;
  const root = document.documentElement.style;
  if (p.bg_color)             root.setProperty('--bg', p.bg_color);
  if (p.secondary_bg_color)   root.setProperty('--card', p.secondary_bg_color);
  if (p.section_bg_color)     root.setProperty('--card', p.section_bg_color);
  if (p.text_color)           root.setProperty('--text', p.text_color);
  if (p.hint_color)           root.setProperty('--dim', p.hint_color);
  if (p.link_color)           root.setProperty('--tgblue', p.link_color);
  if (p.destructive_text_color) root.setProperty('--danger', p.destructive_text_color);
  // card2 derived: slightly offset from card for hover/press states
  root.setProperty('--card2', p.section_separator_color || p.bg_color || '#1c1f26');
}

const initData = tg?.initData || "";

const BASE_URL   = "https://equb-bot-vt5m.onrender.com";
const VERIFY_URL = `${BASE_URL}/verify-admin`;

// ── DOM refs ──
const centerMsg  = document.getElementById('centerMsg');
const cardList   = document.getElementById('cardList');
const searchBar  = document.getElementById('searchBar');
const statusLine = document.getElementById('statusLine');
const overlay    = document.getElementById('overlay');
const overlayImg = document.getElementById('overlayImg');
const modal      = document.getElementById('modal');
const modalBody  = document.getElementById('modalBody');
const modalTitle = document.getElementById('modalTitle');

// Receipt overlay (full screen image)
function openOverlay(imgSrc) {
  overlay.classList.add('open', 'loading');
  overlayImg.src = '';
  const tmp = new Image();
  tmp.onload = () => {
    overlayImg.src = imgSrc;
    overlay.classList.remove('loading');
  };
  tmp.onerror = () => {
    overlay.classList.remove('loading');
    overlayImg.alt = 'ደረሰኝ ማምጣት አልተቻለም';
  };
  tmp.src = imgSrc;
}
document.getElementById('overlayClose').addEventListener('click', () => {
  overlay.classList.remove('open', 'loading');
  overlayImg.src = '';
});
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) {
    overlay.classList.remove('open', 'loading');
    overlayImg.src = '';
  }
});

// Detail modal
function openModal(d) {
  const imgSrc      = receiptSrc(d._pid);
  const displayName = d.full_name || d.username || '—';
  const dt          = (d.reviewed_at || d.created_at || '').replace('T', ' ').slice(0, 16);
  const numList     = splitNumbers(d.numbers);

  const numbersHtml = numList.length > 0
    ? numList.map(n => `<span class="num-chip">${esc(n)}</span>`).join('')
    : `<span class="num-chip">—</span>`;

  modalTitle.textContent = displayName;
  modalBody.innerHTML = `
    <div class="modal-receipt" onclick="openOverlay('${esc(imgSrc)}')">
      <img src="${esc(imgSrc)}" alt="Receipt" loading="lazy">
    </div>
    <div class="info-card">
      <div class="detail-row"><span class="d-label">ስም</span><span class="d-val">${esc(displayName)}</span></div>
      <div class="detail-row"><span class="d-label">Username</span><span class="d-val">${esc(d.username || '—')}</span></div>
      <div class="detail-row"><span class="d-label">ስልክ</span><span class="d-val">${esc(d.phone || '—')}</span></div>
    </div>
    <div class="info-card">
      <div class="nums-wrap">
        <span class="d-label">ቁጥሮች (${numList.length})</span>
        <div class="nums-scroll">${numbersHtml}</div>
      </div>
    </div>
    <div class="info-card">
      <div class="detail-row"><span class="d-label">ዘዴ</span><span class="d-val">${esc(d.payment_method || '—')}</span></div>
      <div class="detail-row"><span class="d-label">የጋበዘው</span><span class="d-val">${esc(String(d._refCount ?? 0))} ሰዎች</span></div>
      <div class="detail-row"><span class="d-label">ቀን</span><span class="d-val">${esc(dt)}</span></div>
    </div>
  `;
  modal.classList.add('open');
}
document.getElementById('modalClose').addEventListener('click', () => {
  modal.classList.remove('open');
});

// Receipt proxy URL — Bot server ያስተናግዳል
function receiptSrc(payment_id) {
  return `${BASE_URL}/get-receipt/${payment_id}`;
}

let allCards = [];

// ── Auth + load ──
async function main() {
  if (!initData) {
    showError("initData ባዶ ነው። Telegram app ዳግም ክፈት።");
    return;
  }
  try {
    const res = await fetch(VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      showError(e.error === "not_admin" ? "access denied" : `ማረጋገጥ አልተቻለም (${res.status})`);
      return;
    }
    const { token } = await res.json();
    await signInWithCustomToken(authf, token);
    await loadPayments();
  } catch (err) {
    console.error(err);
    showError("network error: " + err.message);
  }
}

function showError(msg) {
  centerMsg.textContent = msg;
  centerMsg.classList.add('error');
  centerMsg.style.display = 'block';
}

async function loadPayments() {
  const snap = await getDocs(collection(dbf, 'payments'));
  const cards = [];

  for (const docSnap of snap.docs) {
    const d = docSnap.data();
    if (d.status !== 'approved') continue;
    cards.push({ ...d, _pid: docSnap.id });
  }

  // Referral counts
  const cache = {};
  for (const c of cards) {
    if (cache[c.user_id] === undefined) {
      try {
        const rdoc = await getDoc(doc(dbf, 'referral_counts', String(c.user_id)));
        cache[c.user_id] = rdoc.exists() ? (rdoc.data().count || 0) : 0;
      } catch {
        cache[c.user_id] = '—';
      }
    }
    c._refCount = cache[c.user_id];
  }

  // Pre-compute a normalized search blob per card so filtering is fast + reliable
  for (const c of cards) {
    c._search = [
      c.full_name, c.username, c.phone, c.numbers
    ].filter(Boolean).join(' ').toLowerCase();
    c._numList = splitNumbers(c.numbers);
  }

  cards.sort((a, b) => (b.reviewed_at || '').localeCompare(a.reviewed_at || ''));
  allCards = cards;
  render(cards);

  centerMsg.style.display = cards.length === 0 ? 'block' : 'none';
  if (cards.length === 0) centerMsg.textContent = "ምንም approved ክፍያ የለም።";
}

// "1, 12, 7, 45" የመሰለ ቁጥሮችን ለየብቻ chip ለማድረግ ይከፍላል
function splitNumbers(numbersStr) {
  if (!numbersStr) return [];
  return String(numbersStr)
    .split(',')
    .map(s => s.trim())
    .filter(s => s.length > 0);
}

function formatDate(iso) {
  if (!iso) return '—';
  const datePart = iso.split('T')[0] || '';
  const [y, m, d] = datePart.split('-');
  if (!y || !m || !d) return iso.slice(0, 10);
  return `${d}/${m}/${y}`;
}

function render(cards) {
  statusLine.textContent = `${cards.length} ክፍያ`;
  cardList.innerHTML = '';

  cards.forEach((d, idx) => {
    const displayName = d.full_name || d.username || '—';
    const imgSrc      = receiptSrc(d._pid);
    const dateLabel   = formatDate(d.reviewed_at || d.created_at);
    const numCount    = (d._numList || splitNumbers(d.numbers)).length;
    const rowId       = `rc-${idx}-${d._pid}`;

    const div = document.createElement('div');
    div.className = 'row-card';
    div.innerHTML = `
      <div class="thumb loading" id="th-${esc(rowId)}">
        <img
          src="${esc(imgSrc)}"
          alt=""
          loading="lazy"
          onload="document.getElementById('th-${esc(rowId)}').classList.remove('loading')"
          onerror="this.style.display='none'; document.getElementById('th-${esc(rowId)}').classList.remove('loading')"
        >
      </div>
      <div class="row-info">
        <div class="r-name">${esc(displayName)}</div>
        <div class="r-phone">${esc(d.phone || '—')}</div>
      </div>
      <div class="row-right">
        <div class="row-date">${esc(dateLabel)}</div>
        <div class="row-count">${numCount} ቁጥር</div>
      </div>
    `;
    div.addEventListener('click', () => openModal(d));
    cardList.appendChild(div);
  });
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Make openOverlay global so inline onclick works
window.openOverlay = openOverlay;

// ── Robust search: normalized blob match + numeric-only matching for digit queries ──
function applySearch() {
  const raw = searchBar.value.trim().toLowerCase();
  if (!raw) { render(allCards); return; }

  const isNumericQuery = /^\d+$/.test(raw);

  const filtered = allCards.filter(d => {
    if (d._search && d._search.includes(raw)) return true;
    if (isNumericQuery && d._numList) {
      return d._numList.some(n => n === raw);
    }
    return false;
  });
  render(filtered);
}

// Use multiple events so it works reliably inside Telegram's in-app browser
searchBar.addEventListener('input', applySearch);
searchBar.addEventListener('keyup', applySearch);
searchBar.addEventListener('change', applySearch);

main();
</script>
</body>
</html>
