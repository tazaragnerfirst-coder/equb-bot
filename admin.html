<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin - OPEN TICKET</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0f1117; --card:#1a1d27; --border:#2a2e3a;
    --text:#e8e9ed; --dim:#8b8f9c; --accent:#5b8def; --danger:#ef4444;
    --green:#22c55e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh; padding-bottom:32px;
  }

  /* ── Search bar ── */
  #searchWrap{
    position:sticky; top:0; background:var(--bg); padding:14px 14px 10px;
    z-index:10; border-bottom:1px solid var(--border);
  }
  #searchBar{
    width:100%; padding:11px 14px; border-radius:12px; border:1px solid var(--border);
    background:var(--card); color:var(--text); font-size:15px; outline:none;
    transition: border-color .2s;
  }
  #searchBar:focus{ border-color: var(--accent); }

  #statusLine{ padding:10px 14px 2px; color:var(--dim); font-size:13px; }

  /* ── Cards ── */
  #cardList{ padding:10px 14px; display:flex; flex-direction:column; gap:12px; }

  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    overflow:hidden;
  }

  /* ── Receipt thumbnail ── */
  .receipt-wrap{
    width:100%;
    max-height:200px;
    overflow:hidden;
    position:relative;
    background:#111;
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .receipt-wrap img{
    width:100%;
    height:200px;
    object-fit:cover;
    display:block;
    transition:opacity .2s, transform .2s;
  }
  .receipt-wrap:active img{
    opacity:.8;
    transform:scale(.98);
  }
  .receipt-label{
    position:absolute; bottom:0; left:0; right:0;
    padding:6px 12px; font-size:11.5px; color:#fff;
    background:linear-gradient(transparent, rgba(0,0,0,.7));
    pointer-events:none;
  }
  /* skeleton loader while image fetches */
  .receipt-wrap.loading{
    background: linear-gradient(90deg,#1a1d27 25%,#22263a 50%,#1a1d27 75%);
    background-size:200% 100%;
    animation: shimmer 1.4s infinite;
    height:160px;
  }
  @keyframes shimmer{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
  }

  /* Card body */
  .card-body{ padding:14px 16px; }
  .card .name{ font-size:16px; font-weight:700; margin-bottom:1px; }
  .card .uname{ color:var(--accent); font-size:13px; margin-bottom:10px; }
  .row{
    display:flex; justify-content:space-between; align-items:center;
    font-size:13.5px; padding:4px 0; color:var(--dim);
    border-bottom:1px solid rgba(255,255,255,.04);
  }
  .row:last-child{ border-bottom:none; }
  .row b{ color:var(--text); font-weight:600; }

  /* Status badge */
  .badge{
    font-size:11px; font-weight:700; padding:2px 8px;
    border-radius:20px; letter-spacing:.3px;
  }
  .badge.approved{ background:rgba(34,197,94,.18); color:var(--green); }

  #centerMsg{
    text-align:center; color:var(--dim); padding:60px 20px; font-size:14px;
  }
  #centerMsg.error{ color:var(--danger); }

  /* ── Fullscreen overlay ── */
  #overlay{
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.95);
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  #overlay.open{ display:flex; }

  #overlayImg{
    max-width:100%;
    max-height:82vh;
    border-radius:10px;
    object-fit:contain;
    box-shadow:0 8px 40px rgba(0,0,0,.6);
  }
  #overlayLoader{
    color:var(--dim); font-size:14px; margin-bottom:12px;
    display:none;
  }
  #overlay.loading #overlayLoader{ display:block; }
  #overlay.loading #overlayImg{ opacity:.3; }

  #overlayClose{
    margin-top:20px; padding:11px 36px; border-radius:28px;
    background:var(--card); border:1px solid var(--border);
    color:var(--text); font-size:15px; cursor:pointer;
    transition: background .15s;
  }
  #overlayClose:active{ background:var(--border); }
</style>
</head>
<body>

<div id="searchWrap">
  <input id="searchBar" placeholder="🔍 ስም, ስልክ, ቁጥር ፍለጋ...">
</div>
<div id="statusLine"></div>
<div id="cardList"></div>
<div id="centerMsg">በመጫን ላይ...</div>

<!-- Fullscreen receipt overlay -->
<div id="overlay">
  <div id="overlayLoader">⏳ ደረሰኝ እየጫነ ነው...</div>
  <img id="overlayImg" src="" alt="Receipt">
  <button id="overlayClose">✕ ዝጋ</button>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc }
                           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getAuth, signInWithCustomToken }
                           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyALC5m34A85Xpscnu4N6gW88tYQ1YyaOB0",
  authDomain: "equb-c5f5f.firebaseapp.com",
  projectId: "equb-c5f5f",
  storageBucket: "equb-c5f5f.firebasestorage.app",
  messagingSenderId: "745997733561",
  appId: "1:745997733561:web:6a37c360fdc5fa2d559568"
};

const app   = initializeApp(firebaseConfig);
const dbf   = getFirestore(app);
const authf = getAuth(app);

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const initData = tg?.initData || "";

const BASE_URL   = "https://equb-bot-vt5m.onrender.com";
const VERIFY_URL = `${BASE_URL}/verify-admin`;

// ── DOM refs ──
const centerMsg  = document.getElementById('centerMsg');
const cardList   = document.getElementById('cardList');
const searchBar  = document.getElementById('searchBar');
const statusLine = document.getElementById('statusLine');
const overlay    = document.getElementById('overlay');
const overlayImg = document.getElementById('overlayImg');

// Overlay: open
function openOverlay(imgSrc) {
  overlay.classList.add('open', 'loading');
  overlayImg.src = '';
  const tmp = new Image();
  tmp.onload = () => {
    overlayImg.src = imgSrc;
    overlay.classList.remove('loading');
  };
  tmp.onerror = () => {
    overlay.classList.remove('loading');
    overlayImg.alt = '⚠️ ደረሰኝ ማምጣት አልተቻለም';
  };
  tmp.src = imgSrc;
}

// Overlay: close
document.getElementById('overlayClose').addEventListener('click', () => {
  overlay.classList.remove('open', 'loading');
  overlayImg.src = '';
});
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) {
    overlay.classList.remove('open', 'loading');
    overlayImg.src = '';
  }
});

// Receipt proxy URL — Bot server ያስተናግዳል
function receiptSrc(payment_id) {
  return `${BASE_URL}/get-receipt/${payment_id}`;
}

let allCards = [];

// ── Auth + load ──
async function main() {
  if (!initData) {
    showError("⚠️ initData ባዶ ነው። Telegram app ዳግም ክፈት።");
    return;
  }
  try {
    const res = await fetch(VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      showError(e.error === "not_admin" ? "🚫 access denied" : `⚠️ ማረጋገጥ አልተቻለም (${res.status})`);
      return;
    }
    const { token } = await res.json();
    await signInWithCustomToken(authf, token);
    await loadPayments();
  } catch (err) {
    console.error(err);
    showError("⚠️ network error: " + err.message);
  }
}

function showError(msg) {
  centerMsg.textContent = msg;
  centerMsg.classList.add('error');
  centerMsg.style.display = 'block';
}

async function loadPayments() {
  const snap = await getDocs(collection(dbf, 'payments'));
  const cards = [];

  for (const docSnap of snap.docs) {
    const d = docSnap.data();
    if (d.status !== 'approved') continue;
    cards.push({ ...d, _pid: docSnap.id });
  }

  // Referral counts
  const cache = {};
  for (const c of cards) {
    if (cache[c.user_id] === undefined) {
      try {
        const rdoc = await getDoc(doc(dbf, 'referral_counts', String(c.user_id)));
        cache[c.user_id] = rdoc.exists() ? (rdoc.data().count || 0) : 0;
      } catch {
        cache[c.user_id] = '—';
      }
    }
    c._refCount = cache[c.user_id];
  }

  cards.sort((a, b) => (b.reviewed_at || '').localeCompare(a.reviewed_at || ''));
  allCards = cards;
  render(cards);

  centerMsg.style.display = cards.length === 0 ? 'block' : 'none';
  if (cards.length === 0) centerMsg.textContent = "ምንም approved ክፍያ የለም።";
}

function render(cards) {
  statusLine.textContent = `${cards.length} ካርድ`;
  cardList.innerHTML = '';

  for (const d of cards) {
    const dt          = (d.reviewed_at || d.created_at || '').replace('T', ' ').slice(0, 16);
    const displayName = d.full_name || d.username || '—';
    const imgSrc      = receiptSrc(d._pid);

    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <!-- Receipt thumbnail -->
      <div class="receipt-wrap loading" id="rw-${esc(d._pid)}" onclick="openOverlay('${esc(imgSrc)}')">
        <img
          src="${esc(imgSrc)}"
          alt="Receipt"
          loading="lazy"
          onload="document.getElementById('rw-${esc(d._pid)}').classList.remove('loading')"
          onerror="document.getElementById('rw-${esc(d._pid)}').style.display='none'"
        >
        <div class="receipt-label">🧾 ደረሰኝ — ለማስፋት ይንኩ</div>
      </div>

      <!-- Card info -->
      <div class="card-body">
        <div class="name">👤 ${esc(displayName)}</div>
        <div class="uname">${esc(d.username || '')}</div>
        <div class="row"><span>📞 ስልክ</span><b>${esc(d.phone || '—')}</b></div>
        <div class="row"><span>🎟 ቁጥሮች</span><b>${esc(d.numbers || '—')}</b></div>
        <div class="row"><span>💳 ዘዴ</span><b>${esc(d.payment_method || '—')}</b></div>
        <div class="row"><span>👥 የጋበዘው</span><b>${esc(String(d._refCount ?? 0))} ሰዎች</b></div>
        <div class="row"><span>📅 ቀን</span><b>${esc(dt)}</b></div>
      </div>
    `;
    cardList.appendChild(div);
  }
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Make openOverlay global so inline onclick works
window.openOverlay = openOverlay;

searchBar.addEventListener('input', () => {
  const q = searchBar.value.trim().toLowerCase();
  if (!q) { render(allCards); return; }
  render(allCards.filter(d =>
    (d.full_name   || '').toLowerCase().includes(q) ||
    (d.username    || '').toLowerCase().includes(q) ||
    (d.phone       || '').toLowerCase().includes(q) ||
    (d.numbers     || '').toLowerCase().includes(q)
  ));
});

main();
</script>
</body>
</html>
