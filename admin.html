<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin - OPEN TICKET</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0e0f12; --card:#16181d; --border:#262830;
    --text:#e9e9eb; --dim:#85878d; --accent:#5b8def; --danger:#e5484d;
    --green:#3aa56b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh; padding-bottom:32px;
  }

  /* ── Search bar ── */
  #searchWrap{
    position:sticky; top:0; background:var(--bg); padding:14px 14px 10px;
    z-index:10; border-bottom:1px solid var(--border);
  }
  #searchBar{
    width:100%; padding:10px 13px; border-radius:8px; border:1px solid var(--border);
    background:var(--card); color:var(--text); font-size:15px; outline:none;
  }
  #searchBar:focus{ border-color: var(--accent); }

  #statusLine{ padding:10px 14px 2px; color:var(--dim); font-size:12.5px; }

  /* ── List rows ── */
  #cardList{ padding:6px 14px; display:flex; flex-direction:column; }

  .row-card{
    display:flex; align-items:center; gap:12px;
    padding:10px 4px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .row-card:active{ background:rgba(255,255,255,.03); }

  .thumb{
    width:52px; height:52px; flex:0 0 auto;
    border-radius:8px; overflow:hidden;
    background:#1c1e24;
    position:relative;
  }
  .thumb img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .thumb.loading{
    background: linear-gradient(90deg,#1c1e24 25%,#22252c 50%,#1c1e24 75%);
    background-size:200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
  }

  .row-info{ flex:1; min-width:0; }
  .row-info .r-name{
    font-size:14.5px; font-weight:600; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .row-info .r-phone{
    font-size:13px; color:var(--dim); margin-top:2px;
  }

  .row-date{
    font-size:11.5px; color:var(--dim); white-space:nowrap; flex:0 0 auto;
    text-align:right;
  }

  #centerMsg{
    text-align:center; color:var(--dim); padding:60px 20px; font-size:14px;
  }
  #centerMsg.error{ color:var(--danger); }

  /* ── Detail modal ── */
  #modal{
    display:none; position:fixed; inset:0; z-index:200;
    background:var(--bg);
    flex-direction:column;
  }
  #modal.open{ display:flex; }

  #modalHeader{
    display:flex; align-items:center; gap:10px;
    padding:14px; border-bottom:1px solid var(--border);
  }
  #modalClose{
    background:none; border:1px solid var(--border); color:var(--text);
    width:34px; height:34px; border-radius:8px; font-size:16px;
    cursor:pointer; flex:0 0 auto;
  }
  #modalClose:active{ background:var(--card); }
  #modalTitle{ font-size:15px; font-weight:600; }

  #modalBody{ flex:1; overflow-y:auto; padding:14px; }

  .modal-receipt{
    width:100%; max-height:280px; overflow:hidden;
    border-radius:8px; border:1px solid var(--border);
    background:#000; cursor:pointer; margin-bottom:14px;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-receipt img{
    width:100%; height:100%; object-fit:contain; display:block;
  }

  .detail-row{
    display:flex; justify-content:space-between; align-items:flex-start;
    font-size:13.5px; padding:9px 0; color:var(--dim);
    border-bottom:1px solid var(--border);
    gap:12px;
  }
  .detail-row:last-child{ border-bottom:none; }
  .detail-row .d-label{ flex:0 0 auto; }
  .detail-row .d-val{
    color:var(--text); font-weight:500; text-align:right;
  }

  .nums-wrap{ padding:9px 0; border-bottom:1px solid var(--border); }
  .nums-wrap .d-label{ font-size:13.5px; color:var(--dim); margin-bottom:8px; display:block; }
  .nums-scroll{
    display:flex; gap:6px; overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .num-chip{
    flex:0 0 auto;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:6px;
    padding:5px 10px;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
  }

  /* ── Fullscreen receipt overlay ── */
  #overlay{
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,.95);
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  #overlay.open{ display:flex; }
  #overlayImg{
    max-width:100%; max-height:82vh; border-radius:6px; object-fit:contain;
  }
  #overlayLoader{ color:var(--dim); font-size:14px; margin-bottom:12px; display:none; }
  #overlay.loading #overlayLoader{ display:block; }
  #overlay.loading #overlayImg{ opacity:.3; }
  #overlayClose{
    margin-top:20px; padding:10px 32px; border-radius:8px;
    background:var(--card); border:1px solid var(--border);
    color:var(--text); font-size:14px; cursor:pointer;
  }
  #overlayClose:active{ background:var(--border); }
</style>
</head>
<body>

<div id="searchWrap">
  <input id="searchBar" placeholder="ስም, ስልክ, ቁጥር ፍለጋ...">
</div>
<div id="statusLine"></div>
<div id="cardList"></div>
<div id="centerMsg">በመጫን ላይ...</div>

<!-- Detail modal -->
<div id="modal">
  <div id="modalHeader">
    <button id="modalClose">✕</button>
    <span id="modalTitle">ዝርዝር</span>
  </div>
  <div id="modalBody"></div>
</div>

<!-- Fullscreen receipt overlay -->
<div id="overlay">
  <div id="overlayLoader">ደረሰኝ እየጫነ ነው...</div>
  <img id="overlayImg" src="" alt="Receipt">
  <button id="overlayClose">ዝጋ</button>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc }
                           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getAuth, signInWithCustomToken }
                           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyALC5m34A85Xpscnu4N6gW88tYQ1YyaOB0",
  authDomain: "equb-c5f5f.firebaseapp.com",
  projectId: "equb-c5f5f",
  storageBucket: "equb-c5f5f.firebasestorage.app",
  messagingSenderId: "745997733561",
  appId: "1:745997733561:web:6a37c360fdc5fa2d559568"
};

const app   = initializeApp(firebaseConfig);
const dbf   = getFirestore(app);
const authf = getAuth(app);

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const initData = tg?.initData || "";

const BASE_URL   = "https://equb-bot-vt5m.onrender.com";
const VERIFY_URL = `${BASE_URL}/verify-admin`;

// ── DOM refs ──
const centerMsg  = document.getElementById('centerMsg');
const cardList   = document.getElementById('cardList');
const searchBar  = document.getElementById('searchBar');
const statusLine = document.getElementById('statusLine');
const overlay    = document.getElementById('overlay');
const overlayImg = document.getElementById('overlayImg');
const modal      = document.getElementById('modal');
const modalBody  = document.getElementById('modalBody');
const modalTitle = document.getElementById('modalTitle');

// Receipt overlay (full screen image)
function openOverlay(imgSrc) {
  overlay.classList.add('open', 'loading');
  overlayImg.src = '';
  const tmp = new Image();
  tmp.onload = () => {
    overlayImg.src = imgSrc;
    overlay.classList.remove('loading');
  };
  tmp.onerror = () => {
    overlay.classList.remove('loading');
    overlayImg.alt = 'ደረሰኝ ማምጣት አልተቻለም';
  };
  tmp.src = imgSrc;
}
document.getElementById('overlayClose').addEventListener('click', () => {
  overlay.classList.remove('open', 'loading');
  overlayImg.src = '';
});
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) {
    overlay.classList.remove('open', 'loading');
    overlayImg.src = '';
  }
});

// Detail modal
function openModal(d) {
  const imgSrc      = receiptSrc(d._pid);
  const displayName = d.full_name || d.username || '—';
  const dt          = (d.reviewed_at || d.created_at || '').replace('T', ' ').slice(0, 16);
  const numList     = splitNumbers(d.numbers);

  const numbersHtml = numList.length > 0
    ? numList.map(n => `<span class="num-chip">${esc(n)}</span>`).join('')
    : `<span class="num-chip">—</span>`;

  modalTitle.textContent = displayName;
  modalBody.innerHTML = `
    <div class="modal-receipt" onclick="openOverlay('${esc(imgSrc)}')">
      <img src="${esc(imgSrc)}" alt="Receipt" loading="lazy">
    </div>
    <div class="detail-row"><span class="d-label">ስም</span><span class="d-val">${esc(displayName)}</span></div>
    <div class="detail-row"><span class="d-label">Username</span><span class="d-val">${esc(d.username || '—')}</span></div>
    <div class="detail-row"><span class="d-label">ስልክ</span><span class="d-val">${esc(d.phone || '—')}</span></div>
    <div class="nums-wrap">
      <span class="d-label">ቁጥሮች (${numList.length})</span>
      <div class="nums-scroll">${numbersHtml}</div>
    </div>
    <div class="detail-row"><span class="d-label">ዘዴ</span><span class="d-val">${esc(d.payment_method || '—')}</span></div>
    <div class="detail-row"><span class="d-label">የጋበዘው</span><span class="d-val">${esc(String(d._refCount ?? 0))} ሰዎች</span></div>
    <div class="detail-row"><span class="d-label">ቀን</span><span class="d-val">${esc(dt)}</span></div>
  `;
  modal.classList.add('open');
}
document.getElementById('modalClose').addEventListener('click', () => {
  modal.classList.remove('open');
});

// Receipt proxy URL — Bot server ያስተናግዳል
function receiptSrc(payment_id) {
  return `${BASE_URL}/get-receipt/${payment_id}`;
}

let allCards = [];

// ── Auth + load ──
async function main() {
  if (!initData) {
    showError("initData ባዶ ነው። Telegram app ዳግም ክፈት።");
    return;
  }
  try {
    const res = await fetch(VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      showError(e.error === "not_admin" ? "access denied" : `ማረጋገጥ አልተቻለም (${res.status})`);
      return;
    }
    const { token } = await res.json();
    await signInWithCustomToken(authf, token);
    await loadPayments();
  } catch (err) {
    console.error(err);
    showError("network error: " + err.message);
  }
}

function showError(msg) {
  centerMsg.textContent = msg;
  centerMsg.classList.add('error');
  centerMsg.style.display = 'block';
}

async function loadPayments() {
  const snap = await getDocs(collection(dbf, 'payments'));
  const cards = [];

  for (const docSnap of snap.docs) {
    const d = docSnap.data();
    if (d.status !== 'approved') continue;
    cards.push({ ...d, _pid: docSnap.id });
  }

  // Referral counts
  const cache = {};
  for (const c of cards) {
    if (cache[c.user_id] === undefined) {
      try {
        const rdoc = await getDoc(doc(dbf, 'referral_counts', String(c.user_id)));
        cache[c.user_id] = rdoc.exists() ? (rdoc.data().count || 0) : 0;
      } catch {
        cache[c.user_id] = '—';
      }
    }
    c._refCount = cache[c.user_id];
  }

  cards.sort((a, b) => (b.reviewed_at || '').localeCompare(a.reviewed_at || ''));
  allCards = cards;
  render(cards);

  centerMsg.style.display = cards.length === 0 ? 'block' : 'none';
  if (cards.length === 0) centerMsg.textContent = "ምንም approved ክፍያ የለም።";
}

// "1, 12, 7, 45" የመሰለ ቁጥሮችን ለየብቻ chip ለማድረግ ይከፍላል
function splitNumbers(numbersStr) {
  if (!numbersStr) return [];
  return String(numbersStr)
    .split(',')
    .map(s => s.trim())
    .filter(s => s.length > 0);
}

function formatDate(iso) {
  if (!iso) return '—';
  const datePart = iso.split('T')[0] || '';
  const [y, m, d] = datePart.split('-');
  if (!y || !m || !d) return iso.slice(0, 10);
  return `${d}/${m}/${y}`;
}

function render(cards) {
  statusLine.textContent = `${cards.length} ካርድ`;
  cardList.innerHTML = '';

  cards.forEach((d, idx) => {
    const displayName = d.full_name || d.username || '—';
    const imgSrc      = receiptSrc(d._pid);
    const dateLabel   = formatDate(d.reviewed_at || d.created_at);
    const rowId       = `rc-${idx}-${d._pid}`;

    const div = document.createElement('div');
    div.className = 'row-card';
    div.innerHTML = `
      <div class="thumb loading" id="th-${esc(rowId)}">
        <img
          src="${esc(imgSrc)}"
          alt=""
          loading="lazy"
          onload="document.getElementById('th-${esc(rowId)}').classList.remove('loading')"
          onerror="document.getElementById('th-${esc(rowId)}').style.background='#1c1e24'"
        >
      </div>
      <div class="row-info">
        <div class="r-name">${esc(displayName)}</div>
        <div class="r-phone">${esc(d.phone || '—')}</div>
      </div>
      <div class="row-date">${esc(dateLabel)}</div>
    `;
    div.addEventListener('click', () => openModal(d));
    cardList.appendChild(div);
  });
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Make openOverlay global so inline onclick works
window.openOverlay = openOverlay;

searchBar.addEventListener('input', () => {
  const q = searchBar.value.trim().toLowerCase();
  if (!q) { render(allCards); return; }
  render(allCards.filter(d =>
    (d.full_name   || '').toLowerCase().includes(q) ||
    (d.username    || '').toLowerCase().includes(q) ||
    (d.phone       || '').toLowerCase().includes(q) ||
    (d.numbers     || '').toLowerCase().includes(q)
  ));
});

main();
</script>
</body>
</html>
